<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Gestion des Locations</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-file-contract"></i> Liste des Locations</h2>
        <div class="d-flex gap-2">
            <a href="/locations/export/pdf" class="btn btn-danger"><i class="fas fa-file-pdf"></i> Exporter PDF</a>
            <a href="/locations/export/excel" class="btn btn-success"><i class="fas fa-file-excel"></i> Exporter Excel</a>
            <a href="/locations/add" class="btn btn-warning"><i class="fas fa-plus"></i> Nouvelle Location</a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form action="/locations" method="get" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="statut" class="col-form-label">Statut :</label>
                </div>
                <div class="col-auto">
                    <select class="form-select" id="statut" name="statut">
                        <option value="">Tous</option>
                        <option value="EN_COURS" th:selected="${statut != null and statut.name() == 'EN_COURS'}">En cours</option>
                        <option value="TERMINEE" th:selected="${statut != null and statut.name() == 'TERMINEE'}">Terminée</option>
                        <option value="ANNULEE" th:selected="${statut != null and statut.name() == 'ANNULEE'}">Annulée</option>
                    </select>
                </div>
                <div class="col-auto">
                    <label for="dateDebut" class="col-form-label">Du :</label>
                </div>
                <div class="col-auto">
                    <input type="date" class="form-control" id="dateDebut" name="dateDebut" th:value="${dateDebut}">
                </div>
                <div class="col-auto">
                    <label for="dateFin" class="col-form-label">Au :</label>
                </div>
                <div class="col-auto">
                    <input type="date" class="form-control" id="dateFin" name="dateFin" th:value="${dateFin}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Filtrer</button>
                    <a href="/locations" class="btn btn-secondary">Réinitialiser</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover table-striped">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Client</th>
                    <th>Voiture</th>
                    <th>Dates</th>
                    <th>Montant Total</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="location : ${locations}">
                    <td th:text="${'#' + location.id}"></td>
                    <td class="fw-bold" th:text="${location.client.nom}"></td>
                    <td th:text="${location.voiture.marque + ' - ' + location.voiture.immatriculation}"></td>
                    <td th:text="${#temporals.format(location.dateDebut, 'dd/MM/yyyy')} + ' au ' + ${#temporals.format(location.dateFin, 'dd/MM/yyyy')}"></td>
                    <td th:text="${location.montantTotal} + ' €'" class="fw-bold text-success"></td>
                    <td>
                        <span th:if="${location.statut.name() == 'EN_COURS'}" class="badge bg-warning">En cours</span>
                        <span th:if="${location.statut.name() == 'TERMINEE'}" class="badge bg-success">Terminée</span>
                        <span th:if="${location.statut.name() == 'ANNULEE'}" class="badge bg-danger">Annulée</span>
                    </td>
                    <td>
                        <!-- Formulaire pour changer le statut -->
                        <div class="btn-group" role="group">
                            <form th:action="@{/locations/updateStatut/{id}(id=${location.id})}" method="post" class="d-inline">
                                <input type="hidden" name="statut" value="TERMINEE">
                                <button type="submit" class="btn btn-sm btn-outline-success" th:if="${location.statut.name() == 'EN_COURS'}" title="Marquer comme terminée"><i class="fas fa-check"></i></button>
                            </form>
                            <form th:action="@{/locations/updateStatut/{id}(id=${location.id})}" method="post" class="d-inline ms-1">
                                <input type="hidden" name="statut" value="ANNULEE">
                                <button type="submit" class="btn btn-sm btn-outline-danger" th:if="${location.statut.name() == 'EN_COURS'}" title="Annuler"><i class="fas fa-times"></i></button>
                            </form>
                            <a th:href="@{/locations/edit/{id}(id=${location.id})}" class="btn btn-sm btn-outline-primary ms-1"><i class="fas fa-edit"></i></a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(locations)}">
                    <td colspan="7" class="text-center text-muted">Aucune location trouvée</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
