<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Location de Voitures</title>
    <!-- Bootstrap CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="/css/all.min.css" rel="stylesheet">
    <style>
        body { padding-top: 60px; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="fas fa-car"></i> RentCar Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/voitures"><i class="fas fa-car-side"></i> Voitures</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/clients"><i class="fas fa-users"></i> Clients</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/locations"><i class="fas fa-file-contract"></i> Locations</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4" layout:fragment="content">
    <!-- Content will be inserted here -->
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="/js/bootstrap.bundle.min.js"></script>
<script>
    // Highlight active link
    document.querySelectorAll('.nav-link').forEach(link => {
        if(link.getAttribute('href') === window.location.pathname) {
            link.classList.add('active');
        }
    });
</script>
</body>
</html>
