<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Historique Client</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Fiche client -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-history text-success"></i> Historique de <span th:text="${client.nom}"></span></h2>
        <a href="/clients" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>

    <!-- Info client + stats -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card border-success">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-user"></i> Informations client</h5>
                </div>
                <div class="card-body">
                    <p class="mb-1"><strong>Nom :</strong> <span th:text="${client.nom}"></span></p>
                    <p class="mb-1"><strong>CIN :</strong> <span th:text="${client.cin}"></span></p>
                    <p class="mb-0"><strong>Téléphone :</strong> <span th:text="${client.telephone ?: 'Non renseigné'}"></span></p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white text-center h-100">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6 class="text-uppercase text-white-50">Total locations</h6>
                    <h2 class="mb-0" th:text="${#lists.size(locations)}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white text-center h-100">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6 class="text-uppercase text-white-50">Total dépensé</h6>
                    <h2 class="mb-0" th:text="${#numbers.formatDecimal(totalDepense, 1, 2) + ' MAD'}">0 MAD</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Tableau des locations -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="fas fa-list"></i> Historique des locations</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover table-striped">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Voiture</th>
                    <th>Date début</th>
                    <th>Date fin</th>
                    <th>Montant (MAD)</th>
                    <th>Statut</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="loc : ${locations}">
                    <td th:text="'#' + ${loc.id}"></td>
                    <td th:text="${loc.voiture.marque + ' - ' + loc.voiture.immatriculation}"></td>
                    <td th:text="${#temporals.format(loc.dateDebut, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#temporals.format(loc.dateFin, 'dd/MM/yyyy')}"></td>
                    <td class="fw-bold" th:text="${#numbers.formatDecimal(loc.montantTotal, 1, 2) + ' MAD'}"></td>
                    <td>
                        <span th:if="${loc.statut.name() == 'EN_COURS'}" class="badge bg-warning">En cours</span>
                        <span th:if="${loc.statut.name() == 'TERMINEE'}" class="badge bg-success">Terminée</span>
                        <span th:if="${loc.statut.name() == 'ANNULEE'}" class="badge bg-danger">Annulée</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(locations)}">
                    <td colspan="6" class="text-center text-muted">Aucune location pour ce client</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
