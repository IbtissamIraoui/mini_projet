<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Gestion des Clients</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-users"></i> Liste des Clients</h2>
        <a href="/clients/add" class="btn btn-success"><i class="fas fa-plus"></i> Nouveau Client</a>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover table-striped">
                <thead class="table-light">
                <tr>
                    <th>Nom Complet</th>
                    <th>CIN</th>
                    <th>Téléphone</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client : ${clients}">
                    <td class="fw-bold" th:text="${client.nom}"></td>
                    <td th:text="${client.cin}"></td>
                    <td th:text="${client.telephone}"></td>
                    <td>
                        <a th:href="@{/clients/{id}/historique(id=${client.id})}" class="btn btn-sm btn-outline-info" title="Historique"><i class="fas fa-history"></i></a>
                        <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                        <a th:href="@{/clients/delete/{id}(id=${client.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?');"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(clients)}">
                    <td colspan="4" class="text-center text-muted">Aucun client trouvé</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
